services:
  # Frontend Web Service
  - type: web
    name: levelup-waterloo-web
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production pnpm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: VITE_API_URL
        value: https://levelup-api.render.com
      - key: EXPO_PORT
        value: "3000"

  # Backend API Service
  - type: web
    name: levelup-api
    env: node
    plan: free
    buildCommand: pnpm install && pnpm build
    startCommand: NODE_ENV=production node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: levelup-db
          property: connectionString
      - key: PORT
        value: "3000"

  # PostgreSQL Database Service
  - type: pserv
    name: levelup-db
    plan: free
    ipAllowList: []
    postgreSQL:
      version: "15"
